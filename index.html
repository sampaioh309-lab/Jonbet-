<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JONBET HACKER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:black;
  overflow:hidden;
  color:white;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* DASH */
#dash{
  width:360px;
  padding:25px;
  border-radius:30px;
  background:black;
  box-shadow:0 0 25px #00ff88, 0 0 50px #00ff88; /* 🟢 VERDE */
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.title{
  font-size:24px;
  font-weight:700;
  color:#00ff88;
  text-align:center;
  text-shadow:0 0 15px #00ff88;
  margin-bottom:8px;
}

.versao{
  text-align:center;
  font-size:18px;
  font-weight:700;
  color:white;
  margin-bottom:20px;
  letter-spacing:2px;
  text-shadow:0 0 10px #00ff88, 0 0 20px #00ff88;
}

.versao span{
  display:block;
  font-size:14px;
  font-weight:500;
  color:#66ffcc;
  margin-top:4px;
  text-shadow:0 0 8px #00ff88;
}

.btn{
  width:100%;
  padding:16px;
  border-radius:22px;
  border:none;
  background:#00ff88;
  font-size:16px;
  font-weight:600;
  color:black;
  box-shadow:0 0 25px #00ff88;
  margin-bottom:25px;
}

/* LOADING */
.loading-box{
  margin-bottom:20px;
  text-align:center;
}

.loading-text{
  font-size:14px;
  margin-bottom:10px;
  opacity:.8;
}

.loading-bar{
  display:flex;
  justify-content:center;
  gap:5px;
}

.loading-bar div{
  width:10px;
  height:25px;
  border-radius:4px;
  border:1px solid #444;
  background:transparent;
  transition:0.2s;
}

.loading-bar .active{
  background:#00ff88;
  box-shadow:0 0 10px #00ff88;
}

/* SIGNAL */
.signal-box{
  border-radius:26px;
  padding:22px;
  border:2px solid #00ff88;
  box-shadow:0 0 30px #00ff88;
}

.signal-main{
  background:#00ff88;
  color:black;
  font-size:20px;
  font-weight:700;
  padding:18px;
  border-radius:20px;
  text-align:center;
  margin-bottom:12px;
}

.protection{
  text-align:center;
  font-size:15px;
  margin-bottom:8px;
}

.g1{
  text-align:center;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- DASH DIRETO -->
<div id="dash">
  <div class="title">🟢 Jonbet Scanner</div>

  <div class="versao">
    SINGLE I.A
    <span>V:4.0</span>
  </div>

  <button class="btn" onclick="gerarSinal()">💻 Gerar sinal</button>

  <div class="loading-box">
    <div class="loading-text">Carregando sinal...</div>
    <div class="loading-bar" id="loadingBar"></div>
  </div>

  <div class="signal-box">
    <div class="signal-main" id="sinal">Sistema ativo</div>
    <div class="protection" id="protecao"></div>
    <div class="g1">♻️ até G1</div>
  </div>
</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function drawMatrix(){
  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff88"; // 🟢 VERDE
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix,33);

/* SINAL */
function gerarSinal(){

  const bar = document.getElementById("loadingBar");
  bar.innerHTML = "";

  const total = 20;
  let progresso = 0;

  for(let i=0;i<total;i++){
    const bloco = document.createElement("div");
    bar.appendChild(bloco);
  }

  const blocos = bar.children;

  const intervalo = setInterval(() => {

    if(progresso < total){
      blocos[progresso].classList.add("active");
      progresso++;
    } else {
      clearInterval(intervalo);

      const sinais=[
        {s:"🟢 APOSTAR NO VERDE",p:""},
        {s:"⚫ APOSTAR NO PRETO",p:""},
        {s:"🟢 APOSTAR NO VERDE",p:"🛡 Proteção no ⚪ BRANCO"},
        {s:"⚫ APOSTAR NO PRETO",p:""}
      ];

      const r = sinais[Math.floor(Math.random()*sinais.length)];

      document.getElementById("sinal").innerText=r.s;
      document.getElementById("protecao").innerText=r.p;

    }

  }, 150);
}
</script>

</body>
</html>
